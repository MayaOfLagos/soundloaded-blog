# fly.toml app configuration file generated for soundloaded-audio-worker on 2026-04-13T22:28:26+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'soundloaded-audio-worker'
primary_region = 'lhr'

[build]
  dockerfile = 'docker/Dockerfile.audio-worker'

[env]
  AUDIO_TARGET_BITRATE = '128'
  AUDIO_TARGET_FORMAT = 'aac'
  R2_MUSIC_BUCKET = 'soundloadedblog-music'
  WAVEFORM_PEAKS = '200'
  WORKER_POLL_INTERVAL = '5000'

[processes]
  worker = 'pnpm exec tsx worker/audio-processor.ts'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
